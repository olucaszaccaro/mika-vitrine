<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel · Mika Indica</title>
<meta name="theme-color" content="#5B1E45" />
<meta name="robots" content="noindex" />
<link rel="icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--plum:#5B1E45;--mag:#E64A86;--cream:#FFF6EF;--paper:#fff;--ink:#34232E;--muted:#8a7681;
    --line:#EAD7E1;--ok:#2FA98E;--danger:#D64545;--wa:#1FBA57;--shadow:0 10px 30px rgba(91,30,69,.12)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',system-ui,sans-serif;color:var(--ink);background:var(--cream);min-height:100vh;line-height:1.45}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 80px}
  h1{font-family:'Fraunces',serif;font-weight:600;color:var(--plum);font-size:26px}
  .sub{color:var(--muted);font-size:13.5px;margin-top:2px}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-top:16px}
  label{display:block;font-size:13px;font-weight:600;margin:12px 0 5px;color:var(--plum)}
  input,select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;font:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--mag)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
    font:inherit;font-weight:700;border-radius:12px;padding:13px 16px;width:100%}
  .btn.primary{background:var(--plum);color:#fff}
  .btn.primary:hover{background:#4a1739}
  .btn.g{background:var(--mag);color:#fff}
  .btn.ghost{background:#F6E9F0;color:var(--plum)}
  .btn.sm{width:auto;padding:8px 12px;font-size:13px;font-weight:600;border-radius:9px}
  .btn:disabled{opacity:.55;cursor:default}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .logo{width:44px;height:44px;border-radius:12px}
  .msg{padding:11px 13px;border-radius:11px;font-size:13.5px;margin-top:12px;display:none}
  .msg.err{background:#FDECEC;color:var(--danger);display:block}
  .msg.ok{background:#E7F6EF;color:#1c7d5f;display:block}
  .preview{margin-top:10px;display:none}
  .preview img{width:96px;height:96px;object-fit:cover;border-radius:12px;border:1.5px solid var(--line)}
  .item{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .th{width:54px;height:54px;border-radius:10px;object-fit:cover;background:#F3E7EE;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-weight:700}
  .item .info{flex:1;min-width:0}
  .item .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .m{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:999px}
  .acts{display:flex;gap:6px}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .center{display:grid;place-items:center;min-height:80vh}
  .loginbox{width:100%;max-width:380px}
  a.link{color:var(--mag);font-weight:600;text-decoration:none;font-size:13px}
</style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginView" class="center" style="display:none">
    <div class="loginbox">
      <div style="text-align:center;margin-bottom:8px">
        <img class="logo" src="logo.png" style="width:64px;height:64px;border-radius:18px" alt="Mika Indica" />
        <h1 style="margin-top:10px">Área da Mika</h1>
        <p class="sub">Entre para gerenciar seus produtos.</p>
      </div>
      <div class="card">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="username" placeholder="seu e-mail" />
        <label for="pass">Senha</label>
        <input id="pass" type="password" autocomplete="current-password" placeholder="sua senha" />
        <div style="height:14px"></div>
        <button class="btn primary" id="loginBtn">Entrar</button>
        <div class="msg" id="loginMsg"></div>
        <p class="hint" style="text-align:center;margin-top:14px"><a class="link" href="index.html">← Ver a vitrine</a></p>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminView" class="wrap" style="display:none">
    <div class="top">
      <div style="display:flex;gap:10px;align-items:center">
        <img class="logo" src="logo.png" alt="" />
        <div><h1 style="font-size:22px">Painel da Mika</h1><div class="sub" id="whoami"></div></div>
      </div>
      <button class="btn ghost sm" id="logoutBtn">Sair</button>
    </div>

    <div class="card">
      <h2 style="font-family:'Fraunces',serif;color:var(--plum);font-size:19px" id="formTitle">Novo produto</h2>

      <label for="url">Link do produto (afiliado)</label>
      <input id="url" type="url" placeholder="cole aqui o link do TikTok Shop, Shopee, etc." />
      <button class="btn g sm" id="fetchBtn" style="margin-top:8px">✨ Buscar foto e título</button>
      <div class="hint">Tenta preencher automático. Se não vier, é só preencher/enviar a foto na mão.</div>

      <label for="title">Título</label>
      <input id="title" type="text" placeholder="Ex.: Sérum de Vitamina C" />

      <div class="row">
        <div>
          <label for="price">Preço (opcional)</label>
          <input id="price" type="text" placeholder="R$ 49,90" />
        </div>
        <div>
          <label for="category">Categoria</label>
          <select id="category">
            <option>Beleza</option><option>Casa</option><option>Roupas</option><option>Outros</option>
          </select>
        </div>
      </div>

      <label for="image">Imagem (URL) ou envie um arquivo</label>
      <input id="image" type="url" placeholder="https://... (preenchido pelo botão acima)" />
      <div style="margin-top:8px"><input id="file" type="file" accept="image/*" /></div>
      <div class="preview" id="preview"><img id="previewImg" alt="prévia" /></div>

      <div class="row" style="margin-top:12px;align-items:center">
        <label style="display:flex;gap:8px;align-items:center;margin:0"><input id="active" type="checkbox" checked style="width:auto"> Visível na vitrine</label>
        <div><label for="sort" style="margin:0 0 4px">Destaque</label><input id="sort" type="number" value="0" title="Maior = aparece primeiro"></div>
      </div>

      <div style="height:16px"></div>
      <button class="btn primary" id="saveBtn">Salvar produto</button>
      <button class="btn ghost sm" id="cancelBtn" style="margin-top:8px;display:none">Cancelar edição</button>
      <div class="msg" id="formMsg"></div>
    </div>

    <div class="card">
      <h2 style="font-family:'Fraunces',serif;color:var(--plum);font-size:19px">Meus produtos (<span id="count">0</span>)</h2>
      <div id="list"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPA_URL = 'https://achisyshrzyuxvuvsqog.supabase.co';
    const SUPA_KEY = 'sb_publishable_8otudPOgBQVRQ4-6dfm60w_eRebH1bW';
    const ALLOWED = 'mikaprzsantana@gmail.com';
    const sb = createClient(SUPA_URL, SUPA_KEY);
    const CATCOLOR = { Beleza:'#E64A86', Casa:'#2FA98E', Roupas:'#7B5BD6', Outros:'#8a7681' };
    const $ = id => document.getElementById(id);
    let editingId = null;

    function show(view){ $('loginView').style.display = view==='login'?'grid':'none'; $('adminView').style.display = view==='admin'?'block':'none'; }
    function msg(el, text, kind){ const m=$(el); m.textContent=text; m.className='msg '+(kind||''); }

    // ---- auth ----
    $('loginBtn').onclick = async () => {
      $('loginBtn').disabled = true; msg('loginMsg','','');
      const email = $('email').value.trim(), password = $('pass').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      $('loginBtn').disabled = false;
      if(error){ msg('loginMsg','E-mail ou senha incorretos.','err'); return; }
      boot();
    };
    $('logoutBtn').onclick = async () => { await sb.auth.signOut(); show('login'); };

    async function boot(){
      const { data:{ session } } = await sb.auth.getSession();
      if(!session){ show('login'); return; }
      if(session.user.email !== ALLOWED){ await sb.auth.signOut(); show('login'); msg('loginMsg','Esta conta não tem acesso.','err'); return; }
      $('whoami').textContent = session.user.email;
      show('admin'); loadList();
    }

    // ---- auto preview ----
    $('fetchBtn').onclick = async () => {
      const url = $('url').value.trim();
      if(!url){ msg('formMsg','Cole o link do produto primeiro.','err'); return; }
      $('fetchBtn').disabled = true; $('fetchBtn').textContent='Buscando...'; msg('formMsg','','');
      try{
        const { data, error } = await sb.functions.invoke('link-preview', { body:{ url } });
        if(error) throw error;
        if(data?.image){ $('image').value = data.image; showPreview(data.image); }
        if(data?.title && !$('title').value) $('title').value = data.title;
        if(data?.price && !$('price').value) $('price').value = 'R$ '+String(data.price).replace('.',',');
        if(!data?.image) msg('formMsg','Não achei a foto por esse link — envie a imagem manualmente. 😉','ok');
      }catch(e){ msg('formMsg','Não consegui buscar. Preencha a foto manualmente.','err'); }
      $('fetchBtn').disabled = false; $('fetchBtn').textContent='✨ Buscar foto e título';
    };
    $('image').addEventListener('input', ()=> showPreview($('image').value.trim()));
    function showPreview(src){ if(src){ $('previewImg').src=src; $('preview').style.display='block'; } else { $('preview').style.display='none'; } }

    // ---- file upload ----
    $('file').addEventListener('change', async (e)=>{
      const f = e.target.files[0]; if(!f) return;
      msg('formMsg','Enviando imagem...','');
      const path = Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'');
      const { error } = await sb.storage.from('product-images').upload(path, f, { upsert:false });
      if(error){ msg('formMsg','Falha ao enviar imagem: '+error.message,'err'); return; }
      const { data } = sb.storage.from('product-images').getPublicUrl(path);
      $('image').value = data.publicUrl; showPreview(data.publicUrl); msg('formMsg','Imagem enviada!','ok');
    });

    // ---- save ----
    $('saveBtn').onclick = async () => {
      const rec = {
        title: $('title').value.trim(),
        url: $('url').value.trim(),
        price: $('price').value.trim() || null,
        category: $('category').value,
        image_url: $('image').value.trim() || null,
        active: $('active').checked,
        sort_order: parseInt($('sort').value)||0,
        updated_at: new Date().toISOString()
      };
      if(!rec.title || !rec.url){ msg('formMsg','Preencha ao menos o título e o link.','err'); return; }
      $('saveBtn').disabled = true;
      let error;
      if(editingId){ ({ error } = await sb.from('products').update(rec).eq('id', editingId)); }
      else { ({ error } = await sb.from('products').insert(rec)); }
      $('saveBtn').disabled = false;
      if(error){ msg('formMsg','Erro ao salvar: '+error.message,'err'); return; }
      msg('formMsg', editingId?'Produto atualizado!':'Produto adicionado! 🎉','ok');
      resetForm(); loadList();
    };
    $('cancelBtn').onclick = resetForm;

    function resetForm(){
      editingId = null; $('formTitle').textContent='Novo produto'; $('cancelBtn').style.display='none';
      ['url','title','price','image'].forEach(id=>$(id).value=''); $('sort').value=0; $('active').checked=true;
      $('category').value='Beleza'; $('file').value=''; showPreview('');
    }

    function edit(p){
      editingId = p.id; $('formTitle').textContent='Editar produto'; $('cancelBtn').style.display='block';
      $('url').value=p.url||''; $('title').value=p.title||''; $('price').value=p.price||'';
      $('category').value=p.category||'Outros'; $('image').value=p.image_url||''; $('sort').value=p.sort_order||0;
      $('active').checked=!!p.active; showPreview(p.image_url); window.scrollTo({top:0,behavior:'smooth'});
    }

    async function del(p){
      if(!confirm('Remover "'+p.title+'"?')) return;
      const { error } = await sb.from('products').delete().eq('id', p.id);
      if(error){ alert('Erro ao remover: '+error.message); return; }
      loadList();
    }

    async function loadList(){
      const { data, error } = await sb.from('products').select('*')
        .order('sort_order',{ascending:false}).order('created_at',{ascending:false});
      const list = $('list'); if(error){ list.innerHTML='<p class="hint">Erro ao carregar.</p>'; return; }
      $('count').textContent = data.length;
      if(!data.length){ list.innerHTML='<p class="hint" style="padding:14px 0">Nenhum produto ainda. Adicione o primeiro acima ☝️</p>'; return; }
      list.innerHTML='';
      data.forEach(p=>{
        const el = document.createElement('div'); el.className='item';
        const color = CATCOLOR[p.category]||'#8a7681';
        el.innerHTML = `
          ${p.image_url?`<img class="th" src="${p.image_url}" alt="">`:`<div class="th" style="background:${color}">${(p.title||'?')[0].toUpperCase()}</div>`}
          <div class="info">
            <div class="t">${p.title||''}</div>
            <div class="m"><span class="pill" style="background:${color}">${p.category}</span> ${p.price||''} ${p.active?'':'· <b style="color:#D64545">oculto</b>'}</div>
          </div>`;
        const acts = document.createElement('div'); acts.className='acts';
        const eb = document.createElement('button'); eb.className='btn ghost sm'; eb.textContent='Editar'; eb.onclick=()=>edit(p);
        const db = document.createElement('button'); db.className='btn sm'; db.style.background='#FDECEC'; db.style.color='#D64545'; db.textContent='Excluir'; db.onclick=()=>del(p);
        acts.append(eb, db); el.append(acts); list.append(el);
      });
    }

    boot();
  </script>
</body>
</html>
